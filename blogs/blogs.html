<!DOCTYPE html>
<html class="dark scroll-smooth" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>OpenFOAM Blog | Technical CFD Guides</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=JetBrains+Mono:wght@400;700&amp;family=Space+Grotesk:wght@700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />

    <!-- STANDARD CSS FALLBACK -->
    <style>
        :root {
            --terminal-green: #00ff41;
            --terminal-blue: #00f2ff;
            --bg-deep: #020408;
        }

        body {
            background-color: var(--bg-deep) !important;
            color: #cbd5e1 !important;
            font-family: 'Inter', sans-serif !important;
            margin: 0;
        }

        h1,
        h2,
        h3,
        .nav-logo {
            font-family: 'Space Grotesk', sans-serif !important;
            color: white !important;
        }

        .text-terminal-green {
            color: var(--terminal-green) !important;
        }

        .bg-terminal-green {
            background-color: var(--terminal-green) !important;
        }

        .border-terminal-green {
            border-color: var(--terminal-green) !important;
        }
    </style>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'terminal-green': '#00ff41',
                        'terminal-blue': '#00f2ff',
                        'bg-deep': '#020408',
                    },
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                        space: ['Space Grotesk', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <script defer src="blogs-script.js"></script>
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-bg-deep text-slate-300 font-inter selection:bg-terminal-green selection:text-black;
            }
            h1, h2, h3, .nav-logo {
                @apply font-space tracking-tight;
            }
        }
        .crt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 255, 0, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 100;
        }
        .data-stream-border {
            border: 1px solid rgba(0, 255, 65, 0.1);
            position: relative;
        }
        .data-stream-border::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px; width: 10px; height: 10px;
            border-top: 2px solid #00ff41;
            border-left: 2px solid #00ff41;
        }
        .data-stream-border::after {
            content: '';
            position: absolute;
            bottom: -1px; right: -1px; width: 10px; height: 10px;
            border-bottom: 2px solid #00ff41;
            border-right: 2px solid #00ff41;
        }
    </style>
</head>

<body class="overflow-x-hidden">
    <div class="crt-overlay"></div>
    <nav class="fixed w-full z-50 border-b border-terminal-green/20 bg-black/80 backdrop-blur-xl">
        <div class="max-w-[1600px] mx-auto px-4 h-14 flex items-center justify-between">
            <div class="flex items-center space-x-4 logo-clickable" id="logo-toggle">
                <a href="../index.html" class="flex items-center space-x-4 group">
                    <span
                        class="material-symbols-outlined text-terminal-green group-hover:animate-pulse">flowsheet</span>
                    <span
                        class="nav-logo font-bold tracking-[0.1em] text-sm md:text-lg text-white">OPENFOAM_WALKTHROUGHS
                        // CASE_STUDIES</span>
                </a>
            </div>
            <div class="flex items-center space-x-6 font-mono text-terminal-green text-[10px] uppercase">
                <span class="hidden md:block">STATUS: ARCHIVE_SYNC</span>
                <span class="hidden md:block">CLEARANCE: PUBLIC</span>
                <div class="h-2 w-2 rounded-full bg-terminal-green shadow-[0_0_8px_var(--terminal-green)]">
                </div>
            </div>
        </div>
    </nav>
    <div class="flex pt-14 min-h-screen">
        <aside
            class="w-64 border-r border-terminal-green/10 hidden lg:flex flex-col p-6 sticky top-14 h-[calc(100vh-3.5rem)] overflow-y-auto">
            <div class="space-y-8">
                <div>
                    <h4 class="font-mono uppercase tracking-widest text-[10px] text-slate-500 mb-4">INDEX</h4>
                    <ul class="space-y-3 text-sm font-medium">
                        <li><a class="flex items-center space-x-2 hover:text-terminal-green transition-colors group"
                                href="../index.html"><span
                                    class="material-symbols-outlined text-sm opacity-50">home</span><span>Home</span></a>
                        </li>
                        <li><a class="flex items-center space-x-2 hover:text-terminal-green transition-colors"
                                href="../cases/cases.html"><span
                                    class="material-symbols-outlined text-sm opacity-50">terminal</span><span>Cases</span></a>
                        </li>
                        <li><a class="flex items-center space-x-2 text-terminal-green transition-colors" href="#"><span
                                    class="material-symbols-outlined text-sm">menu_book</span><span>Blogs</span></a>
                        </li>
                        <li><a class="flex items-center space-x-2 hover:text-terminal-green transition-colors"
                                href="../about.html"><span
                                    class="material-symbols-outlined text-sm opacity-50">person_outline</span><span>About</span></a>
                        </li>
                    </ul>
                </div>
            </div>
        </aside>

        <main class="flex-1 p-4 md:p-8 lg:p-12">
            <div class="max-w-4xl mx-auto space-y-12">
                <div class="flex items-center space-x-4 mb-4">
                    <input type="text" id="search" placeholder="SEARCH BLOG POSTS..."
                        class="w-full bg-slate-900 border border-terminal-green/20 text-terminal-green text-sm focus:ring-1 focus:ring-terminal-green rounded px-4 py-3 uppercase placeholder:text-slate-700 font-mono">
                </div>

                <div
                    class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-16 border-b border-terminal-green/10 pb-8 font-mono">
                    <div class="space-y-1">
                        <span class="text-[10px] uppercase text-slate-500">Published Posts</span>
                        <div class="text-xl text-terminal-green">01_LIVE</div>
                    </div>
                    <div class="space-y-1">
                        <span class="text-[10px] uppercase text-slate-500">Drafts</span>
                        <div class="text-xl text-terminal-blue">03_PENDING</div>
                    </div>
                    <div class="space-y-1">
                        <span class="text-[10px] uppercase text-slate-500">Series Active</span>
                        <div class="text-xl text-white">CFD_BASICS</div>
                    </div>
                </div>

                <div id="blog-list" class="space-y-8">
                    <!-- Blog posts injected by blogs-script.js -->
                </div>
            </div>
        </main>
    </div>

    <div class="fixed inset-0 z-[-1] opacity-20 pointer-events-none overflow-hidden">
        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
        <div class="absolute inset-0 bg-gradient-to-b from-transparent via-terminal-green/5 to-transparent"></div>
        <div
            class="absolute inset-0 bg-[linear-gradient(to_right,#10b98110_1px,transparent_1px),linear-gradient(to_bottom,#10b98110_1px,transparent_1px)] bg-[size:40px_40px]">
        </div>
    </div>
</body>

</html>
